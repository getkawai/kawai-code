name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    # Only run the CLA assistant for approved canonical repos so forks are not blocked
    # and contributors do not receive duplicate CLA notifications.
    if: ${{ contains(fromJson('["openai/codex","getkawai/kawai-code"]'), github.repository) }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure CLA signatures branch exists
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = "cla-signatures";
            const ref = `heads/${branch}`;

            try {
              await github.rest.git.getRef({ owner, repo, ref });
              core.info(`Branch ${branch} already exists`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const defaultBranch = context.payload.repository?.default_branch || "main";
            const defaultRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${defaultBranch}`,
            });
            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/heads/${branch}`,
              sha: defaultRef.data.object.sha,
            });
            core.info(`Created branch ${branch} from ${defaultBranch}`);

      - uses: contributor-assistant/github-action@v2.6.1
        # Run on close only if the PR was merged. This will lock the PR to preserve
        # the CLA agreement. We don't want to lock PRs that have been closed without
        # merging because the contributor may want to respond with additional comments.
        # This action has a "lock-pullrequest-aftermerge" option that can be set to false,
        # but that would unconditionally skip locking even in cases where the PR was merged.
        if: |
          (
            github.event_name == 'pull_request_target' &&
            (
              github.event.action == 'opened' ||
              github.event.action == 'synchronize' ||
              (github.event.action == 'closed' && github.event.pull_request.merged == true)
            )
          ) ||
          (
            github.event_name == 'issue_comment' &&
            (
              github.event.comment.body == 'recheck' ||
              github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
            )
          )
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: ${{ github.server_url }}/${{ github.repository }}/blob/main/docs/CLA.md
          path-to-signatures: signatures/cla.json
          branch: cla-signatures
          allowlist: codex,dependabot,dependabot[bot],github-actions[bot]
